[tools]
rumdl = "latest"
taplo = "latest"
yamllint = "latest"

[tasks.grant-permission]
description = "packages 内の .sh ファイルに実行権限を付与する"
quiet = true
run = ["find ./packages -type f -name \"*.sh\" -exec chmod +x {} +"]

[tasks.format]
description = "rumdl, taplo, yamllint を使ってコードを整形する"
quiet = true
run = ["rumdl fmt", "RUST_LOG=warn taplo fmt", "yamllint -f auto ."]

[tasks.lint]
description = "rumdl, taplo, yamllint を使ってコードをチェックする"
quiet = true
run = ["rumdl check", "RUST_LOG=warn taplo fmt --check --diff", "yamllint ."]
