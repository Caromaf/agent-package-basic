[tools]
dprint = "latest"
rumdl = "latest"
uv = "latest"
yamllint = "latest"

[tasks.grant-permission]
description = "packages 内の .sh ファイルに実行権限を付与する"
quiet = true
run = '''
find ./packages ./scripts -type f \
  \( -name "*.sh" -o -name "*.bash" -o -name "*.py" \) -exec chmod +x {} +
'''

[tasks.format]
description = "dprint, rumdl, ruff を使ってコードを整形する"
quiet = true
depends = ["grant-permission"]
run = [
  "dprint fmt",
  "rumdl fmt",
  "uvx ruff format packages scripts",
  "uvx ruff check --fix packages scripts",
]

[tasks.lint]
description = "dprint, rumdl, yamllint, ruff, ty, SKILL.md frontmatter を使ってコードをチェックする"
quiet = true
depends = ["grant-permission"]
run = [
  "dprint check",
  "rumdl check",
  "yamllint .",
  "uvx ruff check packages scripts",
  "uvx ruff format --check packages scripts",
  "uvx ty check packages scripts",
  "uv run --script scripts/check_skill_frontmatter.py",
]

[tasks.sync-profile-deps]
description = "dotfiles の各 profile apm.yml に packages/ の不足依存を追記する。報告のみは `mise run sync-profile-deps -- --check` (引数は -- の後ろで python へ渡す)"
quiet = true
run = "uv run --script scripts/sync_profile_deps.py"
