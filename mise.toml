[tools]
rumdl = "latest"
taplo = "latest"
uv = "latest"
yamllint = "latest"

[tasks.grant-permission]
description = "packages 内の .sh ファイルに実行権限を付与する"
quiet = true
run = ["find ./packages -type f -name \"*.sh\" -exec chmod +x {} +"]

[tasks.format]
description = "rumdl, taplo, yamllint, ruff を使ってコードを整形する"
quiet = true
run = [
  "rumdl fmt",
  "RUST_LOG=warn taplo fmt",
  "yamllint -f auto .",
  "uvx ruff format packages",
  "uvx ruff check --fix packages",
]

[tasks.lint]
description = "rumdl, taplo, yamllint, ruff, ty を使ってコードをチェックする"
quiet = true
run = [
  "rumdl check",
  "RUST_LOG=warn taplo fmt --check --diff",
  "yamllint .",
  "uvx ruff check packages",
  "uvx ruff format --check packages",
  "uvx ty check packages",
]
